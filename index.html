<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MYG Overseas Trip Planner</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="frontend/js/tailwind.config.js"></script>
<link rel="stylesheet" href="frontend/css/styles.css">
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 h-[100dvh] w-full flex flex-col overflow-hidden selection:bg-primary selection:text-white">

<div id="devModeBar" class="hidden-force"></div>
<div id="toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-gray-100 text-white dark:text-gray-900 px-4 py-2 rounded-lg shadow-2xl z-[100] transition-opacity duration-300 opacity-0 pointer-events-none text-sm font-bold border border-gray-700 dark:border-gray-200"></div>
<div id="viewLoading" class="fixed inset-0 z-50 flex justify-center items-center bg-gray-100 dark:bg-gray-950"><div class="loader w-10 h-10"></div></div>

<!-- ========================================================= -->
<!-- UNAUTHENTICATED LAYOUT (Login, Register, Landing) -->
<!-- ========================================================= -->
<div id="unauthLayout" class="hidden-force flex-1 flex flex-col w-full relative overflow-y-auto">
 <header class="flex items-center justify-between px-5 py-3 border-b border-gray-200 dark:border-gray-800 shrink-0 bg-white dark:bg-gray-900 shadow-sm">
    <div class="flex flex-col">
      <h1 class="font-black text-xl text-primary tracking-tight leading-tight">Trip Planner</h1>
      <span id="unauthTripName" class="text-[10px] font-bold text-gray-500 uppercase tracking-wider hidden-force"></span>
    </div>
    <div class="flex gap-1.5">
      <button onclick="updateApp(this)" class="relative p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition focus:outline-none">
         <svg class="w-5 h-5 transition-transform duration-500 active:rotate-180 btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
         <div class="btn-spinner spinner-primary dark:spinner-white hidden-force !w-4 !h-4 border-2 absolute inset-0 m-auto"></div>
      </button>
      <button onclick="toggleTheme()" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition focus:outline-none">🌗</button>
    </div>
 </header>
 
 <main id="unauthMain" class="flex-1 flex flex-col p-4 w-full max-w-lg mx-auto pb-20 relative">
   <div id="viewLanding" class="hidden-force mt-10 space-y-4 w-full animate-slide-up">
     <div class="text-center mb-6">
       <h2 class="text-3xl font-extrabold mb-2 text-gray-900 dark:text-white">Welcome</h2>
       <p class="text-gray-500 dark:text-gray-400 font-medium">Please select an option below.</p>
     </div>
     <div id="landingRegBox" class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 text-center border-t-4 border-t-green-500 hidden-force">
       <h3 class="text-xl font-bold mb-1 text-gray-900 dark:text-white">Join the Trip</h3>
       <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">Registration is currently open.</p>
       <button onclick="navTo('register')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-green-700 shadow-md transition">Register Now</button>
     </div>
     <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 text-center border-t-4 border-t-primary">
       <h3 class="text-xl font-bold mb-1 text-gray-900 dark:text-white">Participant Portal</h3>
       <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">Already registered? Log in here.</p>
       <button onclick="navTo('login')" class="w-full bg-primary text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-md transition">Log In</button>
     </div>
   </div>
   
   <div id="viewRegister" class="hidden-force mt-2 space-y-4 w-full animate-slide-up">
     <div class="flex justify-between items-center pb-2 border-b border-gray-200 dark:border-gray-800 mb-4">
       <div>
         <h3 class="text-xl font-bold text-gray-900 dark:text-white">New Registration</h3>
         <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Person 1 is the Main POC.</p>
       </div>
       <button onclick="goHome()" class="text-sm font-bold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition shadow-sm">Cancel</button>
     </div>
     <form id="regForm" onsubmit="event.preventDefault(); submitRegistration(this.querySelector('button[type=submit]'));" class="space-y-6">
       <div id="membersContainer" class="space-y-6"></div>
       <button type="button" onclick="addRegMember()" class="w-full bg-transparent text-primary dark:text-blue-400 font-bold py-4 rounded-xl border-2 border-primary dark:border-blue-400 border-dashed hover:bg-blue-50 dark:hover:bg-gray-800 transition">+ Add Group Member</button>
       <div class="pt-6">
         <button type="submit" class="w-full bg-green-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-green-700 flex justify-center items-center shadow-lg transition">
           <span class="btn-text">Submit Registration</span><div class="btn-spinner spinner-white hidden-force ml-2"></div>
         </button>
       </div>
     </form>
   </div>
   
   <div id="viewLogin" class="hidden-force mt-10 bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-lg border border-gray-200 dark:border-gray-700 w-full animate-slide-up">
     <div class="flex justify-between items-center mb-6 border-b border-gray-100 dark:border-gray-800 pb-4">
       <h2 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">Secure Login</h2>
       <button onclick="goHome()" class="text-sm font-bold text-gray-500 hover:text-gray-800 dark:hover:text-gray-300 transition focus:outline-none">Cancel</button>
     </div>
     <div id="loginError" class="bg-red-50 text-red-600 dark:bg-red-900/30 dark:text-red-400 p-3 rounded-lg text-sm mb-4 font-bold hidden-force border border-red-200 dark:border-red-800"></div>
     <div class="mb-5">
       <label class="block text-xs font-bold mb-1.5 text-gray-500 dark:text-gray-400 uppercase tracking-wider">Full NRIC / FIN</label>
       <input type="text" id="loginNric" class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-xl uppercase font-bold text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 focus:border-primary focus:ring-2 focus:ring-primary/20 transition outline-none" placeholder="S1234567A" onkeypress="handleEnter(event, () => attemptLogin(document.getElementById('loginSubmitBtn')))">
     </div>
     <div class="mb-8 relative">
       <label class="block text-xs font-bold mb-1.5 text-gray-500 dark:text-gray-400 uppercase tracking-wider">Password</label>
       <input type="password" id="loginPass" class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-xl pr-12 font-bold text-gray-900 dark:text-white bg-gray-50 dark:bg-gray-900 focus:border-primary focus:ring-2 focus:ring-primary/20 transition outline-none" placeholder="••••••••" onkeypress="handleEnter(event, () => attemptLogin(document.getElementById('loginSubmitBtn')))">
       <button type="button" onclick="togglePassword('loginPass')" class="absolute right-3 top-[28px] p-2 text-gray-400 hover:text-primary transition focus:outline-none">
         <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
         <svg id="eyeClosed" class="hidden-force" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>
       </button>
     </div>
     <button id="loginSubmitBtn" onclick="attemptLogin(this)" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold text-lg hover:bg-blue-600 transition flex justify-center items-center shadow-lg focus:outline-none">
       <span class="btn-text">Login</span><div class="btn-spinner spinner-white hidden-force ml-2"></div>
     </button>
   </div>
 </main>
</div>

<!-- ========================================================= -->
<!-- AUTHENTICATED LAYOUT (Workspace Dashboard) -->
<!-- ========================================================= -->
<div id="authLayout" class="hidden-force flex-1 flex flex-col md:flex-row w-full bg-gray-50 dark:bg-gray-900 overflow-hidden">
  
  <!-- Navigation Sidebar (Desktop) / Bottom Nav (Mobile) -->
  <nav class="order-2 md:order-1 w-full md:w-56 bg-white/95 dark:bg-gray-950/95 backdrop-blur-md border-t md:border-t-0 md:border-r border-gray-200 dark:border-gray-800 flex flex-col pb-safe z-30 shrink-0 md:shadow-none transition-colors shadow-[0_-4px_15px_-5px_rgba(0,0,0,0.05)]">
     
     <!-- App Title (Desktop Only) -->
     <div class="hidden md:flex flex-col p-5 border-b border-gray-200 dark:border-gray-800 shrink-0">
         <h1 class="font-black text-xl text-primary leading-tight tracking-tight mb-1">Trip Planner</h1>
         <span id="deskTripName" class="text-[10px] font-bold text-gray-500 uppercase tracking-wider truncate"></span>
     </div>
     
     <!-- Profile Header (Desktop Only) -->
     <div class="hidden md:flex flex-col p-5 border-b border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-900/50 shrink-0">
         <span class="text-[10px] font-semibold text-gray-400 mb-0.5 uppercase tracking-widest">Logged In As</span>
         <span class="font-bold text-sm truncate text-gray-900 dark:text-gray-100" id="deskUserName">User</span>
         <span class="text-[10px] font-bold px-2 py-0.5 rounded border bg-blue-50 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800 w-max mt-1.5 shadow-sm" id="deskUserRole">Role</span>
     </div>

     <!-- Nav Links (Row on Mobile, Col on Desktop) -->
     <div class="flex md:flex-col w-full md:p-3 md:gap-1.5 justify-around md:justify-start items-center md:items-stretch overflow-x-auto md:overflow-visible scrollbar-hide">
         
         <button id="nav-profile" onclick="switchTab('profile')" class="nav-item flex-1 md:flex-none flex flex-col md:flex-row items-center md:justify-start justify-center gap-0.5 md:gap-3 py-2 md:px-4 md:py-3 transition-all focus:outline-none text-gray-500 dark:text-gray-400 font-medium border-t-2 md:border-t-0 md:border-l-2 border-transparent md:rounded-xl">
            <svg class="w-[20px] h-[20px] md:w-5 md:h-5 shrink-0 mb-0.5 md:mb-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
            <span class="text-[10px] md:text-sm whitespace-nowrap">Profile</span>
         </button>
         
         <button id="nav-logistics" onclick="switchTab('logistics')" class="nav-item admin-only flex-1 md:flex-none flex flex-col md:flex-row items-center md:justify-start justify-center gap-0.5 md:gap-3 py-2 md:px-4 md:py-3 transition-all focus:outline-none text-gray-500 dark:text-gray-400 font-medium border-t-2 md:border-t-0 md:border-l-2 border-transparent md:rounded-xl">
            <svg class="w-[20px] h-[20px] md:w-5 md:h-5 shrink-0 mb-0.5 md:mb-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" /></svg>
            <span class="text-[10px] md:text-sm whitespace-nowrap">Pairing</span>
         </button>

         <button id="nav-attendance" onclick="switchTab('attendance')" class="nav-item admin-only flex-1 md:flex-none flex flex-col md:flex-row items-center md:justify-start justify-center gap-0.5 md:gap-3 py-2 md:px-4 md:py-3 transition-all focus:outline-none text-gray-500 dark:text-gray-400 font-medium border-t-2 md:border-t-0 md:border-l-2 border-transparent md:rounded-xl">
            <svg class="w-[20px] h-[20px] md:w-5 md:h-5 shrink-0 mb-0.5 md:mb-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0118 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3l1.5 1.5 3-3.75" /></svg>
            <span class="text-[10px] md:text-sm whitespace-nowrap">Attendance</span>
         </button>

         <button id="nav-finance" onclick="switchTab('finance')" class="nav-item admin-only flex-1 md:flex-none flex flex-col md:flex-row items-center md:justify-start justify-center gap-0.5 md:gap-3 py-2 md:px-4 md:py-3 transition-all focus:outline-none text-gray-500 dark:text-gray-400 font-medium border-t-2 md:border-t-0 md:border-l-2 border-transparent md:rounded-xl">
            <svg class="w-[20px] h-[20px] md:w-5 md:h-5 shrink-0 mb-0.5 md:mb-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[10px] md:text-sm whitespace-nowrap">Finance</span>
         </button>

         <button id="nav-settings" onclick="switchTab('settings')" class="nav-item admin-only flex-1 md:flex-none flex flex-col md:flex-row items-center md:justify-start justify-center gap-0.5 md:gap-3 py-2 md:px-4 md:py-3 transition-all focus:outline-none text-gray-500 dark:text-gray-400 font-medium border-t-2 md:border-t-0 md:border-l-2 border-transparent md:rounded-xl">
            <svg class="w-[20px] h-[20px] md:w-5 md:h-5 shrink-0 mb-0.5 md:mb-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            <span class="text-[10px] md:text-sm whitespace-nowrap">Settings</span>
         </button>
     </div>
     
     <!-- Logout (Desktop) -->
     <div class="hidden md:block mt-auto p-4 border-t border-gray-200 dark:border-gray-800 shrink-0">
         <button onclick="logout(this)" class="w-full flex items-center justify-center gap-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-bold py-2.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition focus:outline-none border border-gray-300 dark:border-gray-700 shadow-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
            <span class="btn-text">Logout</span><div class="btn-spinner hidden-force !w-3 !h-3"></div>
         </button>
     </div>
  </nav>
  
  <!-- Main Workspace Content Area -->
  <div class="order-1 md:order-2 flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">
     
     <!-- Workspace Topbar -->
     <header class="flex items-center justify-between bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 px-3 md:px-4 py-2 shrink-0 z-20 shadow-sm">
        <div class="flex flex-col md:hidden w-1/2 min-w-0">
            <span class="font-black text-lg text-primary leading-tight truncate tracking-tight">Trip Planner</span>
            <span id="mobTripName" class="text-[10px] font-bold text-gray-500 uppercase tracking-wider truncate"></span>
        </div>
        
        <div id="headerLegend" class="hidden md:flex flex-wrap gap-1 flex-1 px-4 min-w-0"></div>
        
        <div class="flex items-center gap-1.5 md:gap-3 shrink-0 justify-end w-1/2 md:w-auto">
            <button onclick="updateApp(this)" class="relative p-1.5 md:p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition focus:outline-none">
               <svg class="w-5 h-5 md:w-5 md:h-5 transition-transform duration-500 active:rotate-180 btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
               <div class="btn-spinner spinner-primary dark:spinner-white hidden-force !w-4 !h-4 border-2 absolute inset-0 m-auto"></div>
            </button>
            <button onclick="toggleTheme()" class="p-1.5 md:p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition focus:outline-none">🌗</button>
            <button onclick="logout(this)" class="md:hidden p-1.5 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition focus:outline-none">
               <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
            </button>
        </div>
     </header>
     
     <!-- Mobile Legend Bar (Only visible if projects exist) -->
     <div id="mobHeaderLegend" class="md:hidden bg-white dark:bg-gray-950 border-b border-gray-100 dark:border-gray-800 px-3 py-1.5 flex flex-wrap gap-1 shrink-0 empty:hidden"></div>

     <!-- Tab Contents -->
     <main id="tabContainer" class="flex-1 overflow-y-auto overflow-x-hidden p-2 md:p-4 w-full relative custom-scrollbar">
        <div id="tab-profile" class="tab-content hidden-force pb-10 w-full max-w-4xl mx-auto space-y-4"></div>
        <div id="tab-logistics" class="tab-content hidden-force h-full min-h-full flex flex-col w-full max-w-6xl mx-auto"></div>
        <div id="tab-attendance" class="tab-content hidden-force h-full min-h-full flex flex-col w-full max-w-5xl mx-auto"></div>
        <div id="tab-finance" class="tab-content hidden-force h-full min-h-full flex flex-col w-full max-w-4xl mx-auto">
