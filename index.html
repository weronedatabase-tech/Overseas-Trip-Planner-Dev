<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Overseas Trip Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: '#2563eb' } } }
    }
  </script>
  <style>
    /* Minimalist overrides */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; transition: background-color 0.3s, color 0.3s; }
    .dark body { background-color: #1a202c; color: #e2e8f0; }
    .dark input, .dark select, .dark textarea { background-color: #2d3748; color: white; border-color: #4a5568; }
    .hidden-force { display: none !important; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex flex-col">

  <!-- DEV MODE INDICATOR -->
  <div id="devModeBar" class="bg-red-600 text-white text-center py-1 text-sm font-bold hidden-force">
    DEV MODE ACTIVE
  </div>

  <!-- TOP NAVBAR -->
  <header class="bg-white dark:bg-gray-800 shadow px-4 py-3 flex justify-between items-center z-10">
    <div class="font-bold text-lg text-primary">TripApp 2025</div>
    <div class="flex items-center space-x-3">
      <button onclick="updateApp()" class="text-xs bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">
        Update App
      </button>
      <button onclick="toggleTheme()" class="text-xl" aria-label="Toggle Dark Mode">🌗</button>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <main class="flex-grow overflow-y-auto p-4 relative" id="mainContent">
    
    <!-- ERROR / NOTIFICATION TOAST -->
    <div id="toast" class="fixed top-16 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-4 py-2 rounded shadow-lg z-50 transition-opacity duration-300 opacity-0 pointer-events-none text-sm font-medium"></div>

    <!-- VIEW 1: LOGIN -->
    <div id="viewLogin" class="max-w-sm mx-auto mt-10 bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
      <h2 class="text-2xl font-semibold mb-6 text-center">Secure Login</h2>
      <div id="loginError" class="text-red-500 text-sm mb-2 font-medium hidden-force"></div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Full NRIC / FIN</label>
        <input type="text" id="loginNric" class="w-full p-2 border rounded uppercase" placeholder="S1234567A" onkeypress="handleEnter(event, attemptLogin)">
      </div>

      <div class="mb-6 relative">
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" id="loginPass" class="w-full p-2 border rounded pr-10" placeholder="••••••••" onkeypress="handleEnter(event, attemptLogin)">
        <button type="button" onclick="togglePassword('loginPass')" class="absolute right-2 top-8 text-gray-500">👁️</button>
      </div>

      <button onclick="attemptLogin()" class="w-full bg-primary text-white py-2 rounded hover:bg-blue-700 transition flex justify-center items-center">
        <span id="loginText">Login</span>
        <div id="loginLoader" class="loader hidden-force ml-2 border-white"></div>
      </button>
    </div>

    <!-- VIEW 2: DASHBOARD (Post Login) -->
    <div id="viewDashboard" class="hidden-force max-w-4xl mx-auto space-y-6">
      
      <!-- User Info Card -->
      <div class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow flex justify-between items-center">
        <div>
          <h3 class="text-lg font-bold">Welcome back!</h3>
          <p class="text-sm text-gray-500" id="userRoleBadge">Role: Participant</p>
        </div>
        <button onclick="logout()" class="text-red-500 text-sm font-medium">Logout</button>
      </div>

      <!-- Navigation Tabs (Only visible items based on role) -->
      <div class="flex space-x-2 overflow-x-auto pb-2 border-b dark:border-gray-700" id="navTabs">
        <button onclick="switchTab('register')" class="tab-btn px-4 py-2 font-medium border-b-2 border-primary text-primary whitespace-nowrap">Registration</button>
        <button onclick="switchTab('attendance')" class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap hidden-force admin-only">Attendance</button>
        <button onclick="switchTab('finance')" class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap hidden-force admin-only">Finance</button>
        <button onclick="switchTab('minutes')" class="tab-btn px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap hidden-force admin-only">Minutes</button>
      </div>

      <!-- TAB CONTENT: REGISTRATION -->
      <div id="tab-register" class="tab-content">
        <form id="regForm" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow space-y-4" onsubmit="event.preventDefault(); submitRegistration();">
          <h3 class="text-xl font-bold mb-4 border-b pb-2">Participant Details</h3>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm mb-1">Full Name (As in Passport)</label><input id="regName" required type="text" class="w-full p-2 border rounded"></div>
            <div><label class="block text-sm mb-1">Email Address</label><input id="regEmail" required type="email" class="w-full p-2 border rounded"></div>
            <div>
              <label class="block text-sm mb-1">Role</label>
              <select id="regRole" class="w-full p-2 border rounded" onchange="toggleTraineeFields()">
                <option value="TRAINEE">Trainee</option>
                <option value="CAREGIVER">Caregiver</option>
                <option value="VOLUNTEER">Volunteer</option>
              </select>
            </div>
            <div><label class="block text-sm mb-1">Gender</label><select id="regGender" class="w-full p-2 border rounded"><option>Male</option><option>Female</option></select></div>
            <div><label class="block text-sm mb-1">Contact Number (8-digit)</label><input id="regContact" required type="tel" pattern="[0-9]{8}" class="w-full p-2 border rounded"></div>
            <div><label class="block text-sm mb-1">Date of Birth</label><input id="regDob" required type="date" class="w-full p-2 border rounded"></div>
          </div>

          <div id="traineeRelationDiv" class="hidden-force bg-blue-50 dark:bg-gray-700 p-4 rounded mt-4">
             <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
               <div><label class="block text-sm mb-1">Related Trainee's Name</label><input id="regRelatedTrainee" type="text" class="w-full p-2 border rounded"></div>
               <div><label class="block text-sm mb-1">Relationship to Trainee</label><input id="regRelationship" type="text" placeholder="e.g. Mother, Uncle" class="w-full p-2 border rounded"></div>
             </div>
          </div>

          <!-- Sensitive Data Protected via OTP (Mocked UI for brevity) -->
          <div class="mt-6 border border-gray-200 dark:border-gray-600 rounded p-4 relative overflow-hidden">
            <div id="sensitiveOverlay" class="absolute inset-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-sm flex flex-col justify-center items-center z-10">
              <p class="text-sm font-medium mb-2">Passport & NRIC Data is locked.</p>
              <button type="button" onclick="requestOTP()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded shadow hover:bg-gray-300">Request Email OTP to Unlock</button>
              
              <div id="otpBox" class="mt-4 hidden-force text-center">
                <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" class="text-center w-40 p-2 border rounded mb-2">
                <br>
                <button type="button" onclick="verifyOTP()" class="bg-primary text-white px-4 py-1 rounded text-sm">Verify</button>
              </div>
            </div>

            <h4 class="font-bold mb-2">Sensitive Particulars</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div><label class="block text-sm mb-1">Full NRIC / FIN</label><input id="regNric" type="text" class="w-full p-2 border rounded" readonly></div>
              <div><label class="block text-sm mb-1">Passport No.</label><input id="regPassport" type="text" class="w-full p-2 border rounded"></div>
              <div><label class="block text-sm mb-1">Passport Expiry (>6mths valid)</label><input id="regExpiry" type="date" class="w-full p-2 border rounded"></div>
              <div><label class="block text-sm mb-1">Nationality</label><input id="regNat" type="text" class="w-full p-2 border rounded"></div>
            </div>
          </div>

          <div class="pt-4"><button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700">Submit Registration</button></div>
        </form>
      </div>

      <!-- TAB CONTENT: ATTENDANCE (OFFLINE CAPABLE) -->
      <div id="tab-attendance" class="tab-content hidden-force bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
          <h3 class="text-xl font-bold">Offline Attendance Scanner</h3>
          <span id="networkStatus" class="px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-bold">Online</span>
        </div>
        <p class="text-sm text-gray-500 mb-4">Take attendance even when internet drops. It will auto-sync when connection is restored.</p>
        
        <input type="text" id="searchAtt" placeholder="Search Participant (Fuzzy)..." class="w-full p-3 border rounded mb-4 shadow-sm" onkeyup="fuzzySearchAttendance()">
        
        <div id="attendanceList" class="space-y-2 max-h-96 overflow-y-auto">
          <!-- Populated by JS -->
        </div>
        <button onclick="forceSyncAttendance()" class="mt-4 w-full bg-primary text-white py-2 rounded">Force Sync to Server</button>
      </div>

    </div>
  </main>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    // --- APP CONFIGURATION ---
    const DEV_MODE = true; // MUST MATCH BACKEND!
    const URLS = {
      DEV: "https://script.google.com/macros/s/AKfycby48gbzI_4V0TEJ0Gra4Qb_J3xywBA6A792d2reGx0QWUx-6QFEKRWBTmr8mGG86osg/exec",
      PROD: "https://script.google.com/macros/s/AKfycbz4OLZtR2lX97MrGZVaNg13Lrzvwgy7mBfQr7PgoQGK617sL8ZCkKvZD2hIZodus-O_/exec"
    };
    const API_URL = DEV_MODE ? URLS.DEV : URLS.PROD;

    // --- STATE MANAGEMENT ---
    let currentUser = null;
    let offlineQueue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');

    // --- INITIALIZATION ---
    window.onload = () => {
      if(DEV_MODE) document.getElementById('devModeBar').classList.remove('hidden-force');
      if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
      
      const savedSession = localStorage.getItem('userSession');
      if(savedSession) {
        currentUser = JSON.parse(savedSession);
        showDashboard();
      }
      
      // Monitor Network
      window.addEventListener('online', () => {
        updateNetworkStatus(true);
        if(offlineQueue.length > 0) forceSyncAttendance();
      });
      window.addEventListener('offline', () => updateNetworkStatus(false));
      updateNetworkStatus(navigator.onLine);

      registerInlineServiceWorker();
    };

    function updateApp() {
      showToast("Updating app data and clearing caches...");
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) { registration.unregister(); }
        });
      }
      setTimeout(() => location.reload(true), 1000);
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `fixed top-16 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded shadow-lg z-50 transition-opacity duration-300 text-sm font-medium text-white ${isError ? 'bg-red-600' : 'bg-green-600'}`;
      t.classList.remove('opacity-0');
      setTimeout(() => t.classList.add('opacity-0'), 4000);
    }

    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function handleEnter(e, func) {
      if(e.key === 'Enter') func();
    }

    function showLoginError(msg) {
      const err = document.getElementById('loginError');
      err.textContent = msg;
      err.classList.remove('hidden-force');
    }

    // --- API CALL ABSTRACTION ---
    async function callBackend(action, payload) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: action, ...payload }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } // text/plain to avoid CORS preflight issues with GAS
        });
        
        if(!res.ok) throw new Error("Network response was not OK");
        const data = await res.json();
        if(data.status === 'error') throw new Error(data.message);
        return data;
      } catch (err) {
        console.error(err);
        // Prompt with Google Permissions hint if fetching fails entirely (GAS specific)
        if(err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
           showToast("Network Error or Google Permissions needed. Attempting redirect...", true);
           setTimeout(() => window.open(API_URL, '_blank'), 2000); // Opens GAS url to trigger Auth flow
        } else {
           throw err;
        }
      }
    }

    // --- AUTHENTICATION ---
    async function attemptLogin() {
      const nric = document.getElementById('loginNric').value.trim().toUpperCase();
      const pass = document.getElementById('loginPass').value;
      const btnText = document.getElementById('loginText');
      const loader = document.getElementById('loginLoader');
      const err = document.getElementById('loginError');

      if(!nric || !pass) return showLoginError("Please enter NRIC and Password");
      
      err.classList.add('hidden-force');
      btnText.classList.add('hidden-force');
      loader.classList.remove('hidden-force');

      try {
        const res = await callBackend('login', { nric: nric, password: pass });
        currentUser = { nric: nric, role: res.role };
        localStorage.setItem('userSession', JSON.stringify(currentUser));
        showDashboard();
      } catch (error) {
        showLoginError(error.message);
      } finally {
        btnText.classList.remove('hidden-force');
        loader.classList.add('hidden-force');
      }
    }

    function logout() {
      localStorage.removeItem('userSession');
      currentUser = null;
      document.getElementById('viewDashboard').classList.add('hidden-force');
      document.getElementById('viewLogin').classList.remove('hidden-force');
    }

    function showDashboard() {
      document.getElementById('viewLogin').classList.add('hidden-force');
      document.getElementById('viewDashboard').classList.remove('hidden-force');
      
      document.getElementById('userRoleBadge').textContent = `Role: ${currentUser.role === 'admin' ? 'Committee (Admin)' : 'Participant'}`;
      document.getElementById('regNric').value = currentUser.nric; // pre-fill

      if(currentUser.role === 'admin') {
        document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden-force'));
      }
    }

    // --- TABS & UI LOGIC ---
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden-force'));
      document.querySelectorAll('.tab-btn').forEach(el => {
        el.classList.remove('border-primary', 'text-primary');
        el.classList.add('border-transparent', 'text-gray-500');
      });
      document.getElementById(`tab-${tabId}`).classList.remove('hidden-force');
      event.target.classList.remove('border-transparent', 'text-gray-500');
      event.target.classList.add('border-primary', 'text-primary');
    }

    function toggleTraineeFields() {
      const role = document.getElementById('regRole').value;
      const el = document.getElementById('traineeRelationDiv');
      if(role === 'CAREGIVER' || role === 'VOLUNTEER') {
        el.classList.remove('hidden-force');
      } else {
        el.classList.add('hidden-force');
      }
    }

    // --- OTP LOGIC ---
    async function requestOTP() {
      const btn = event.target;
      btn.textContent = "Sending...";
      btn.disabled = true;
      try {
        const res = await callBackend('requestOTP', { nric: currentUser.nric });
        showToast(`OTP sent to ${res.emailHint}`);
        document.getElementById('otpBox').classList.remove('hidden-force');
        btn.classList.add('hidden-force');
      } catch (err) {
        showToast(err.message, true);
        btn.textContent = "Request Email OTP";
        btn.disabled = false;
      }
    }

    async function verifyOTP() {
      const otp = document.getElementById('otpInput').value;
      if(!otp) return showToast("Please enter OTP", true);
      try {
        await callBackend('verifyOTP', { nric: currentUser.nric, otp: otp });
        document.getElementById('sensitiveOverlay').classList.add('hidden-force');
        showToast("Access Granted");
      } catch (err) {
        showToast(err.message, true);
      }
    }

    // --- OFFLINE ATTENDANCE & PWA BLOB ---
    function updateNetworkStatus(isOnline) {
      const span = document.getElementById('networkStatus');
      if(isOnline) {
        span.textContent = "Online";
        span.className = "px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-bold";
      } else {
        span.textContent = "Offline (Local Storage)";
        span.className = "px-2 py-1 bg-red-100 text-red-800 rounded text-xs font-bold";
      }
    }

    async function forceSyncAttendance() {
      if(offlineQueue.length === 0) return showToast("No offline records to sync.");
      if(!navigator.onLine) return showToast("Still offline. Cannot sync yet.", true);

      try {
        await callBackend('syncAttendance', { records: offlineQueue });
        offlineQueue =[];
        localStorage.setItem('offlineQueue', JSON.stringify([]));
        showToast("Attendance synced successfully!");
      } catch (err) {
        showToast("Sync failed. Will retry later.", true);
      }
    }

    function markAttendance(name, nric, status) {
      const record = {
        juncture: new Date().toLocaleTimeString(),
        group: "Bus 1", // Should be dynamic based on admin selector
        name: name,
        nric: nric,
        status: status,
        takenBy: currentUser.nric
      };
      offlineQueue.push(record);
      localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
      showToast(`Saved: ${name} marked as ${status}`);
      if(navigator.onLine) forceSyncAttendance();
    }

    // Dynamic Service Worker Injection (Fulfils Single File Constraint)
    function registerInlineServiceWorker() {
      if ('serviceWorker' in navigator) {
        const swCode = `
          const CACHE_NAME = 'trip-app-v1';
          const urlsToCache =[ location.href ];
          self.addEventListener('install', event => {
            event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
          });
          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request).then(response => {
                return response || fetch(event.request).catch(() => caches.match(location.href));
              })
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).then(reg => {
          console.log("Inline PWA Service Worker Registered", reg);
        });
      }
    }

  </script>
</body>
</html>
