name: Deploy Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google Clasp
        run: npm install -g @google/clasp

      - name: Write Clasp Credentials (Safely via Node)
        env:
          CLASPRC_JSON_SECRET: ${{ secrets.CLASPRC_JSON }}
        run: |
          node -e "
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          
          try {
            if (!process.env.CLASPRC_JSON_SECRET) {
              throw new Error('Secret is empty! Check GitHub Secrets.');
            }
            
            let parsed = JSON.parse(process.env.CLASPRC_JSON_SECRET);
            console.log('🔍 Secret JSON root keys found:', Object.keys(parsed).join(', '));
            
            // Auto-fix 1: User mistakenly pasted GCP credentials.json instead of clasp token
            if (parsed.installed || parsed.web) {
              throw new Error('You pasted the Google Cloud OAuth Client ID (credentials.json). You need the ~/.clasprc.json generated by clasp login.');
            }
            
            // Auto-fix 2: The token is raw/naked and missing the clasp wrapper
            if (!parsed.token && (parsed.refresh_token || parsed.access_token)) {
              console.log('🛠️ Detected raw token without wrapper. Auto-correcting JSON structure...');
              parsed = {
                token: parsed,
                oauth2ClientSettings: {
                  clientId: '1072944905499-h2t9wa9jv8p5lj0i0k2n4v4915mbsqve.apps.googleusercontent.com',
                  clientSecret: 'AocvnaROzHhB5OQ6oT39P7zO',
                  redirectUri: 'http://localhost'
                },
                isLocalCreds: false
              };
            }
            
            // Final validation
            if (!parsed.token || !parsed.token.access_token) {
               throw new Error('JSON is still missing the access_token. Please run clasp login again and copy the exact output.');
            }
            
            // Safely write to runner's home directory
            const destPath = path.join(os.homedir(), '.clasprc.json');
            fs.writeFileSync(destPath, JSON.stringify(parsed, null, 2), 'utf8');
            console.log('✅ Successfully wrote validated .clasprc.json');
            
          } catch (e) {
            console.error('❌ ERROR:', e.message);
            process.exit(1);
          }
          "

      - name: Create .clasp.json config
        working-directory: ./backend
        run: |
          cat <<EOF > .clasp.json
          {
            "scriptId": "${{ secrets.GAS_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push Code to Apps Script
        working-directory: ./backend
        run: clasp push --force

      - name: Deploy and Maintain Web App URL
        working-directory: ./backend
        run: |
          clasp deploy -i ${{ secrets.GAS_DEPLOYMENT_ID }} -d "Auto-deploy via GitHub Actions (Commit ${{ github.sha }})"
