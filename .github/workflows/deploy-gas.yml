name: Deploy Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google Clasp
        run: npm install -g @google/clasp

      - name: Write Clasp Credentials (Safely via Node)
        env:
          CLASPRC_JSON_SECRET: ${{ secrets.CLASPRC_JSON }}
        run: |
          node -e "
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          
          try {
            if (!process.env.CLASPRC_JSON_SECRET) {
              throw new Error('Secret is empty! Check GitHub Secrets.');
            }
            
            let parsed = JSON.parse(process.env.CLASPRC_JSON_SECRET);
            console.log('🔍 Secret JSON root keys found:', Object.keys(parsed).join(', '));
            
            if (parsed.installed || parsed.web) {
              throw new Error('You pasted the Google Cloud OAuth Client ID (credentials.json). You need the ~/.clasprc.json generated by clasp login.');
            }
            
            // Deep search for the actual token data (handling 'token', 'tokens', or raw formats)
            let tokenData = null;
            if (parsed.access_token || parsed.refresh_token) {
              tokenData = parsed;
            } else if (parsed.token && (parsed.token.access_token || parsed.token.refresh_token)) {
              tokenData = parsed.token;
            } else if (parsed.tokens && (parsed.tokens.access_token || parsed.tokens.refresh_token)) {
              tokenData = parsed.tokens;
            }
            
            if (!tokenData) {
               throw new Error('Could not find access_token or refresh_token anywhere in the JSON object.');
            }
            
            console.log('🛠️ Token data located. Normalizing clasp structure...');
            
            // Reconstruct the exact structure Clasp strictly requires
            let finalClaspData = {
              token: tokenData,
              oauth2ClientSettings: parsed.oauth2ClientSettings || {
                clientId: '1072944905499-h2t9wa9jv8p5lj0i0k2n4v4915mbsqve.apps.googleusercontent.com',
                clientSecret: 'AocvnaROzHhB5OQ6oT39P7zO',
                redirectUri: 'http://localhost'
              },
              isLocalCreds: parsed.isLocalCreds !== undefined ? parsed.isLocalCreds : false
            };
            
            // Safely write to runner's home directory
            const destPath = path.join(os.homedir(), '.clasprc.json');
            fs.writeFileSync(destPath, JSON.stringify(finalClaspData, null, 2), 'utf8');
            console.log('✅ Successfully wrote validated and normalized .clasprc.json');
            
          } catch (e) {
            console.error('❌ ERROR:', e.message);
            process.exit(1);
          }
          "

      - name: Create .clasp.json config
        working-directory: ./backend
        run: |
          cat <<EOF > .clasp.json
          {
            "scriptId": "${{ secrets.GAS_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push Code to Apps Script
        working-directory: ./backend
        run: clasp push --force

      - name: Deploy and Maintain Web App URL
        working-directory: ./backend
        run: |
          clasp deploy -i ${{ secrets.GAS_DEPLOYMENT_ID }} -d "Auto-deploy via GitHub Actions (Commit ${{ github.sha }})"
