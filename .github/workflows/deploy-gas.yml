name: Deploy Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google Clasp
        run: npm install -g @google/clasp

      - name: Write Clasp Credentials (Safely via Node)
        env:
          CLASPRC_JSON_SECRET: ${{ secrets.CLASPRC_JSON }}
        run: |
          node -e "
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          
          try {
            // 1. Verify the secret isn't empty
            if (!process.env.CLASPRC_JSON_SECRET) {
              throw new Error('Secret is empty! Check GitHub Secrets.');
            }
            
            // 2. Parse JSON to ensure it is perfectly formatted
            const parsed = JSON.parse(process.env.CLASPRC_JSON_SECRET);
            
            // 3. Double check the token actually exists inside
            if (!parsed.token || !parsed.token.access_token) {
               throw new Error('JSON is valid, but missing the token.access_token property!');
            }
            
            // 4. Safely write directly to the runner's home directory
            const destPath = path.join(os.homedir(), '.clasprc.json');
            fs.writeFileSync(destPath, process.env.CLASPRC_JSON_SECRET, 'utf8');
            console.log('✅ Successfully parsed and wrote .clasprc.json');
            
          } catch (e) {
            console.error('❌ CRITICAL ERROR writing credentials:', e.message);
            process.exit(1);
          }
          "

      - name: Create .clasp.json config
        working-directory: ./backend
        run: |
          cat <<EOF > .clasp.json
          {
            "scriptId": "${{ secrets.GAS_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push Code to Apps Script
        working-directory: ./backend
        run: clasp push --force

      - name: Deploy and Maintain Web App URL
        working-directory: ./backend
        run: |
          clasp deploy -i ${{ secrets.GAS_DEPLOYMENT_ID }} -d "Auto-deploy via GitHub Actions (Commit ${{ github.sha }})"
